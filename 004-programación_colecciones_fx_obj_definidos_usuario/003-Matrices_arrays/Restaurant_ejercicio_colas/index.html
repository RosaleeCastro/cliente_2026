<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Cocina con colas</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
        background: #f5f5f5;
      }

      h1 {
        margin-bottom: 20px;
      }

      .controles {
        margin-bottom: 20px;
      }

      input {
        padding: 8px;
        width: 250px;
      }

      button {
        padding: 8px 12px;
        cursor: pointer;
      }

      #mensajes {
        margin: 15px 0;
        padding: 12px;
        background: #eef;
        border-radius: 8px;
        min-height: 24px;
      }

      .zonas {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
        margin-top: 20px;
      }

      .cola {
        border: 1px solid #ccc;
        background: #fff;
        border-radius: 8px;
        padding: 12px;
      }

      .cola h2 {
        margin-top: 0;
        font-size: 18px;
      }

      ul {
        padding-left: 20px;
        margin-bottom: 0;
      }

      .contador {
        margin-top: 10px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h1>Gestión de pedidos de cocina</h1>

    <div class="controles">
      <input type="text" id="inputPlato" placeholder="Introduce un plato" />
      <button id="btnAgregar">Añadir plato</button>
    </div>

    <p class="contador">
      Platos terminados: <span id="contadorTerminados">0</span>
    </p>

    <div id="mensajes"></div>

    <div class="zonas">
      <div class="cola">
        <h2>Pedidos en espera</h2>
        <ul id="listaEspera"></ul>
      </div>

      <div class="cola">
        <h2>Parrilla</h2>
        <ul id="listaParrilla"></ul>
      </div>

      <div class="cola">
        <h2>Horno</h2>
        <ul id="listaHorno"></ul>
      </div>

      <div class="cola">
        <h2>Plancha</h2>
        <ul id="listaPlancha"></ul>
      </div>

      <div class="cola">
        <h2>Emplatado</h2>
        <ul id="listaEmplatado"></ul>
      </div>
    </div>

    <script src="cola.js"></script>
    <script src="app.js"></script>
  </body>
</html>
