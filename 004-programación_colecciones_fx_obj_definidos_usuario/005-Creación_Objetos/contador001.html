<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Componente A: Contador</title>

    <style>
      /* =========================
   ESTILO DEL COMPONENTE
   ========================= */

      .counter {
        display: inline-block;
        padding: 20px;
        border: 2px solid #333;
        border-radius: 10px;
        width: 150px;
        text-align: center;
        font-family: Arial, sans-serif;
      }

      button {
        margin: 5px;
      }
    </style>
  </head>

  <body>
    <h1>Componente A: Contador</h1>

    <div id="app"></div>

    <script>
      /* =====================================
   COMPONENTE CONTADOR
   ===================================== */

      class Counter {
        /* =========================
       CONSTRUCTOR
       ========================= */

        constructor(initialValue = 0) {
          /* Estado del contador */

          this.value = initialValue;

          /* Creación del DOM del componente */

          this.createStructure();

          /* Asignación de eventos */

          this.bindEvents();

          /* Render inicial */

          this.updateDisplay();
        }

        /* =========================
       CREACIÓN DE ESTRUCTURA
       ========================= */

        createStructure() {
          this.element = document.createElement("div");
          this.element.className = "counter";

          this.display = document.createElement("p");

          this.btnInc = document.createElement("button");
          this.btnInc.textContent = "Incrementar";

          this.btnReset = document.createElement("button");
          this.btnReset.textContent = "Resetear";

          this.element.append(this.display, this.btnInc, this.btnReset);
        }

        /* =========================
       EVENTOS
       ========================= */

        bindEvents() {
          this.btnInc.onclick = () => this.increment();

          this.btnReset.onclick = () => this.reset();
        }

        /* =========================
       ACTUALIZAR PANTALLA
       ========================= */

        updateDisplay() {
          this.display.textContent = this.value;
        }

        /* =========================
       MICROSERVICIOS
       ========================= */

        increment() {
          this.value++;

          this.updateDisplay();
        }

        reset() {
          this.value = 0;

          this.updateDisplay();
        }

        /* =========================
       RENDERIZADO
       ========================= */

        render(container) {
          container.appendChild(this.element);
        }
      }

      /* =====================================
   INICIALIZACIÓN DE LA APLICACIÓN
   ===================================== */

      const app = document.getElementById("app");

      const counter = new Counter();

      counter.render(app);
    </script>
  </body>
</html>
