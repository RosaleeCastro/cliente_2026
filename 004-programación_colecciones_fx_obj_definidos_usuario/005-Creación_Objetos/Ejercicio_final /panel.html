<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Pestañas Simples Corregidas</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        padding: 20px;
      }
      .tab-buttons button {
        padding: 10px;
        margin-right: 5px;
        cursor: pointer;
        background: #ddd;
        border: 1px solid #777;
        border-radius: 5px;
      }
      .tab-section {
        display: none;
        background: white;
        padding: 20px;
        border-radius: 5px;
        border: 1px solid #333;
        margin-top: 10px;
      }

      /* Clase que faltaba */
      .disabled {
        opacity: 0.3;
        pointer-events: none;
      }
      .myButton {
        margin: 5px;
        padding: 8px;
        border-radius: 4px;
        border: 1px solid blue;
      }
      .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .modal {
        background: white;
        padding: 20px;
        border-radius: 8px;
        min-width: 300px;
      }
      #btnareas {
        margin-top: 15px;
        display: flex;
        gap: 10px;
      }
      .tab-section div:hover {
        background-color: #f9f9f9;
      }
    </style>
  </head>
  <body>
    <div id="tabsContainer"></div>

    <section id="inicio" class="tab-section">
      <h2>Inicio</h2>
      <p>Bienvenido a la sección de inicio.</p>
    </section>

    <section id="productos" class="tab-section">
      <h2>Productos</h2>
      <p>Listado de productos disponibles.</p>
    </section>

    <section id="contacto" class="tab-section">
      <h2>Contacto</h2>
      <p>Puedes contactarnos mediante el formulario.</p>
    </section>

    <template id="modalTemplate">
      <div class="overlay">
        <div class="modal">
          <h2>Titulo del modal</h2>
          <label for="producto" class="productoLabel"
            >Ingresa el nombre del producto
          </label>
          <input type="text" id="inputProducto" />
          <div id="btnareas"></div>
        </div>
      </div>
    </template>

    <script>
      const productos = ["Colacao", "Leche"];

      class MyButton {
        constructor(text) {
          this.button = document.createElement("button");
          this.button.className = "myButton";
          this.button.textContent = text + " A";

          this.button2 = document.createElement("button");
          this.button2.className = "myButton";
          this.button2.textContent = text + " B";
          this.button2.classList.add("disabled"); // Empezar con B desactivado

          this.button.onclick = () => {
            this.toggle(this.button, this.button2);
          };

          this.button2.onclick = () => {
            this.toggle(this.button2, this.button);
          };
        }

        toggle(btnOff, btnOn) {
          btnOff.classList.add("disabled");
          btnOn.classList.remove("disabled");
        }

        render(container) {
          container.appendChild(this.button);
          container.appendChild(this.button2);
        }
      }

      class Modal {
        constructor(titulo) {
          //capturo el template
          const tpl = document.getElementById("modalTemplate");
          //clono los hijos del template
          this.element = tpl.content.firstElementChild.cloneNode(true);

          //Configurar título dinámico
          this.element.querySelector("h2").textContent = titulo;
          this.btnArea = this.element.querySelector("#btnareas");
          this.input = this.element.querySelector("#inputProducto");
          this.productoLabel = this.element.querySelector(".productoLabel");
        }
        //Método para añadir botones personalizados

        addButton(text, callback, isPrimary = false) {
          //1. creamos el elemnto botón stándart
          const btn = document.createElement("button");
          btn.textContent = text;

          //2. Le da un color según si es una acción principal(Guardar) o secundaria (Cancelar)
          btn.style.background = isPrimary ? "#4CAF50" : "#f44336";
          btn.style.color = "white";

          // 3. Define qué pasa al hacer click
          btn.onclick = () => {
            callback(this.input.value);
            this.close();
          };
          this.btnArea.appendChild(btn);
        }

        open() {
          document.body.appendChild(this.element);
        }
        close() {
          document.body.removeChild(this.element);
        }
      }

      class Tabs {
        constructor(tabNames, sectionIds) {
          this.tabNames = tabNames;
          this.sectionIds = sectionIds;
          this.container = document.createElement("div");
          this.btnArea = document.createElement("div");
          this.btnArea.className = "tab-buttons";
          this.container.appendChild(this.btnArea);

          this.createButtons();
          this.showTab(0);
        }

        createButtons() {
          this.tabNames.forEach((name, index) => {
            const btn = document.createElement("button");
            btn.textContent = name;
            btn.onclick = () => this.showTab(index);
            this.btnArea.appendChild(btn);
          });
        }

        showTab(index) {
          document
            .querySelectorAll(".tab-section")
            .forEach((sec) => (sec.style.display = "none"));
          const sectionId = this.sectionIds[index];
          const section = document.getElementById(sectionId);
          if (section) {
            section.style.display = "block";
            this.initSection(sectionId); // Llama al selector de lógica
          }
        }

        initSection(sectionId) {
          if (sectionId === "inicio") this.initInicio();
          if (sectionId == "productos") this.initProductos();
          // Aquí podrías añadir this.initProductos() si lo creas más adelante
        }

        initInicio() {
          const section = document.getElementById("inicio");
          if (section.querySelector(".myButton")) return;

          const botonesAlternos = new MyButton("Modo");
          botonesAlternos.render(section);

          const alertBtn = document.createElement("button");
          alertBtn.textContent = "Mensaje";
          alertBtn.onclick = () => alert("Hola!");
          section.appendChild(alertBtn);
        }

        initProductos() {
          const sectionPro = document.getElementById("productos");

          //1. Limpiar la sección para evitar duplicados al cambiar de pestaña
          sectionPro.innerHTML = "<h2>Productos nuevos</h2>";

          //2.Crear contenedor de lista y llenarlo
          const listaContainer = document.createElement("div");
          listaContainer.style.marginBottom = "20px";

          productos.forEach((producto, index) => {
            //creamos el contenedor de la fila
            const productoFila = document.createElement("div");
            productoFila.style.display = "flex";
            productoFila.style.alignItems = "center";
            productoFila.style.marginBottom = "5px";

            //Creamos el texto del producto
            const productoTexto = document.createElement("span");
            productoTexto.textContent = "• " + producto;
            productoTexto.style.flexGrow = "1"; // Empuja el botón al final

            //Creamos el "tachito"
            const btnIndividualDelete = document.createElement("button");
            btnIndividualDelete.textContent = "🗑️";
            btnIndividualDelete.style.cursor = "pointer";
            btnIndividualDelete.style.marginLeft = "10px";

            //Lógica de la eliminación Individual

            btnIndividualDelete.onclick = () => {
              const modalIndivDelete = new Modal("¿Eliminar producto?");
              modalIndivDelete.input.style.display = "none"; // no mostrar el input
              modalIndivDelete.productoLabel.textContent = `¿Seguro que quieres borrar ? ${producto}`;

              modalIndivDelete.addButton(
                "Eliminar",
                () => {
                  productos.splice(index, 1); // Borra el elemento en esa posición
                  this.initProductos();
                },
                true,
              );
              modalIndivDelete.addButton("Cancelar", () => {});
              modalIndivDelete.open();
            };

            productoFila.appendChild(productoTexto);
            productoFila.appendChild(btnIndividualDelete);
            listaContainer.appendChild(productoFila);
          });
          sectionPro.appendChild(listaContainer);

          //3. Boton Agregar Producto

          const btnAdd = document.createElement("button");
          btnAdd.textContent = "Agregar Producto";

          btnAdd.onclick = () => {
            const modalAddProducto = new Modal("Nuevo Producto");
            modalAddProducto.addButton(
              "Guardar",
              (valor) => {
                if (valor.trim() !== "") {
                  productos.push(valor); //Agregamos al array global
                  this.initProductos(); // refrescamos la vista
                  alert("Producto agregado");
                }
              },
              true,
            );

            modalAddProducto.addButton("Cancelar", () => {}); // solo cierra
            modalAddProducto.open();
          };

          //4. Boton "Eliminar todos"

          const btnDelete = document.createElement("button");
          btnDelete.textContent = "Eliminar todos";
          btnDelete.style.marginLeft = "10px";
          btnDelete.onclick = () => {
            const m = new Modal("¿Deseas Eliminar todos?");
            m.input.style.display = "none";
            m.productoLabel.style.display = "none";
            m.addButton(
              "Si, eliminar",
              () => {
                productos.length = 0; // vacia el array de productos;
                this.initProductos(); // refreseca la lineas
                alert("Productos Eliminados");
              },
              true,
            );
            m.addButton("No", () => {});
            m.open();
          };
          //5. Inserción final : Meter los botones en la sección
          sectionPro.appendChild(btnAdd);
          sectionPro.appendChild(btnDelete);
        }

        render(container) {
          container.appendChild(this.container);
        }
      }

      const myTabs = new Tabs(
        ["Inicio", "Productos", "Contacto"],
        ["inicio", "productos", "contacto"],
      );
      myTabs.render(document.getElementById("tabsContainer"));
    </script>
  </body>
</html>
