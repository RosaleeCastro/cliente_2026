<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Pestañas Simples Corregidas</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        padding: 20px;
      }
      .tab-buttons button {
        padding: 10px;
        margin-right: 5px;
        cursor: pointer;
        background: #ddd;
        border: 1px solid #777;
        border-radius: 5px;
      }
      .tab-section {
        display: none;
        background: white;
        padding: 20px;
        border-radius: 5px;
        border: 1px solid #333;
        margin-top: 10px;
      }

      /* Clase que faltaba */
      .disabled {
        opacity: 0.3;
        pointer-events: none;
      }
      .myButton {
        margin: 5px;
        padding: 8px;
        border-radius: 4px;
        border: 1px solid blue;
      }
    </style>
  </head>
  <body>
    <div id="tabsContainer"></div>

    <section id="inicio" class="tab-section">
      <h2>Inicio</h2>
      <p>Bienvenido a la sección de inicio.</p>
    </section>

    <section id="productos" class="tab-section">
      <h2>Productos</h2>
      <p>Listado de productos disponibles.</p>
    </section>

    <section id="contacto" class="tab-section">
      <h2>Contacto</h2>
      <p>Puedes contactarnos mediante el formulario.</p>
    </section>

    <script>
      class MyButton {
        constructor(text) {
          this.button = document.createElement("button");
          this.button.className = "myButton";
          this.button.textContent = text + " A";

          this.button2 = document.createElement("button");
          this.button2.className = "myButton";
          this.button2.textContent = text + " B";
          this.button2.classList.add("disabled"); // Empezar con B desactivado

          this.button.onclick = () => {
            this.toggle(this.button, this.button2);
          };

          this.button2.onclick = () => {
            this.toggle(this.button2, this.button);
          };
        }

        toggle(btnOff, btnOn) {
          btnOff.classList.add("disabled");
          btnOn.classList.remove("disabled");
        }

        render(container) {
          container.appendChild(this.button);
          container.appendChild(this.button2);
        }
      }

      class Tabs {
        constructor(tabNames, sectionIds) {
          this.tabNames = tabNames;
          this.sectionIds = sectionIds;
          this.container = document.createElement("div");
          this.btnArea = document.createElement("div");
          this.btnArea.className = "tab-buttons";
          this.container.appendChild(this.btnArea);

          this.createButtons();
          this.showTab(0);
        }

        createButtons() {
          this.tabNames.forEach((name, index) => {
            const btn = document.createElement("button");
            btn.textContent = name;
            btn.onclick = () => this.showTab(index);
            this.btnArea.appendChild(btn);
          });
        }

        showTab(index) {
          document
            .querySelectorAll(".tab-section")
            .forEach((sec) => (sec.style.display = "none"));
          const sectionId = this.sectionIds[index];
          const section = document.getElementById(sectionId);
          if (section) {
            section.style.display = "block";
            this.initSection(sectionId); // Llama al selector de lógica
          }
        }

        initSection(sectionId) {
          if (sectionId === "inicio") this.initInicio();
          // Aquí podrías añadir this.initProductos() si lo creas más adelante
        }

        initInicio() {
          const section = document.getElementById("inicio");
          if (section.querySelector(".myButton")) return;

          const botonesAlternos = new MyButton("Modo");
          botonesAlternos.render(section);

          const alertBtn = document.createElement("button");
          alertBtn.textContent = "Mensaje";
          alertBtn.onclick = () => alert("Hola!");
          section.appendChild(alertBtn);
        }

        render(container) {
          container.appendChild(this.container);
        }
      }

      const myTabs = new Tabs(
        ["Inicio", "Productos", "Contacto"],
        ["inicio", "productos", "contacto"],
      );
      myTabs.render(document.getElementById("tabsContainer"));
    </script>
  </body>
</html>
