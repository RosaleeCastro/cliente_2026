<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Componente A: Contador</title>

    <style>
      /* =========================
   ESTILO DEL COMPONENTE
   ========================= */

      .counter {
        display: inline-block;
        padding: 20px;
        border: 2px solid #333;
        border-radius: 10px;
        width: 150px;
        text-align: center;
        font-family: Arial, sans-serif;
      }

      button {
        margin: 5px;
      }
    </style>
  </head>

  <body>
    <h1>Componente A: Contador</h1>

    <!-- Contenedor donde se renderiza el componente -->
    <div id="app"></div>

    <script>
      /* =====================================
   COMPONENTE CONTADOR
   =====================================

   Este componente crea un contador
   que puede:

   - incrementar el valor
   - resetear el valor

   Además genera su propio HTML
   usando JavaScript.
*/

      class Counter {
        /* =========================
       1. CONSTRUCTOR
       =========================
       Inicializa el estado del componente
       y crea la estructura del DOM
    */

        constructor() {
          /* Estado interno del contador */
          this.value = 0;

          /* =========================
           CREACIÓN DE ELEMENTOS
           ========================= */

          this.element = document.createElement("div");
          this.element.className = "counter";

          this.display = document.createElement("p");
          this.display.textContent = this.value;

          this.btnInc = document.createElement("button");
          this.btnInc.textContent = "Incrementar";

          this.btnReset = document.createElement("button");
          this.btnReset.textContent = "Resetear";

          /* =========================
           EVENTOS
           ========================= */

          this.btnInc.onclick = () => this.increment();

          this.btnReset.onclick = () => this.reset();

          /* =========================
           ESTRUCTURA DEL COMPONENTE
           ========================= */

          this.element.append(this.display, this.btnInc, this.btnReset);
        }

        /* =========================
       MICROSERVICIOS
       ========================= */

        /* Incrementa el valor del contador */

        increment() {
          this.value++;

          this.display.textContent = this.value;
        }

        /* Reinicia el contador */

        reset() {
          this.value = 0;

          this.display.textContent = this.value;
        }

        /* =========================
       RENDERIZADO DEL COMPONENTE
       ========================= */

        render(container) {
          container.appendChild(this.element);
        }
      }

      /* =====================================
   INICIALIZACIÓN DE LA APLICACIÓN
   ===================================== */

      /* Captura del contenedor principal */

      const app = document.getElementById("app");

      /* Creación del componente */

      const counter = new Counter();

      /* Renderizado del contador */

      counter.render(app);
    </script>
  </body>
</html>
