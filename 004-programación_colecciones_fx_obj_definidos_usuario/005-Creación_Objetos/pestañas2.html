<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Pestañas Simples sin Map</title>

    <style>
      /* =========================
   1. ESTILOS GENERALES
   ========================= */

      body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        padding: 20px;
      }

      /* =========================
   2. ESTILOS DEL COMPONENTE DE PESTAÑAS
   ========================= */

      .tabs {
        margin-bottom: 20px;
      }

      /* Botones de pestañas */
      .tab-buttons button {
        padding: 10px;
        margin-right: 5px;
        cursor: pointer;
        background: #ddd;
        border: 1px solid #777;
        border-radius: 5px;
      }

      .tab-buttons button:hover {
        background: #ccc;
      }

      /* Secciones de contenido */
      .tab-section {
        display: none;
        background: white;
        padding: 20px;
        border-radius: 5px;
        border: 1px solid #333;
      }
    </style>
  </head>

  <body>
    <h1>Pestañas con JavaScript</h1>

    <!-- Contenedor donde se renderiza el componente de pestañas -->
    <div id="tabsContainer"></div>

    <!-- =========================
     Secciones de contenido
     ========================= -->
    <section id="inicio" class="tab-section">
      <h2>Inicio</h2>
      <p>Bienvenido a la sección de inicio.</p>
    </section>

    <section id="productos" class="tab-section">
      <h2>Productos</h2>
      <p>Listado de productos disponibles.</p>
    </section>

    <section id="contacto" class="tab-section">
      <h2>Contacto</h2>
      <p>Puedes contactarnos mediante el formulario.</p>
    </section>

    <script>
      /* ==================================================
   3. COMPONENTE DE PESTAÑAS
   ==================================================

   Esta clase crea un componente de pestañas que permite:

   - crear botones dinámicamente
   - mostrar la sección correspondiente
   - cambiar de pestaña al hacer clic
*/

      class Tabs {
        /* =========================
     3.1 CONSTRUCTOR
     =========================
     Inicializa el componente con nombres de pestañas
     y los IDs de las secciones correspondientes
  */
        constructor(tabNames, sectionIds) {
          this.tabNames = tabNames;
          this.sectionIds = sectionIds;

          /* Contenedor principal del componente */
          this.container = document.createElement("div");
          this.container.className = "tabs";

          /* Área donde se agregarán los botones */
          this.btnArea = document.createElement("div");
          this.btnArea.className = "tab-buttons";

          /* Ensamblamos la estructura */
          this.container.appendChild(this.btnArea);

          /* Crear botones y asignar eventos */
          this.createButtons();

          /* Mostrar la primera pestaña por defecto */
          this.showTab(0);
        }

        /* =========================
     3.2 CREACIÓN DE BOTONES
     ========================= */
        createButtons() {
          this.tabNames.forEach((name, index) => {
            const btn = document.createElement("button");
            btn.textContent = name;

            /* Evento de clic para mostrar la pestaña correspondiente */
            btn.onclick = () => this.showTab(index);

            /* Agregar el botón al área de botones */
            this.btnArea.appendChild(btn);
          });
        }

        /* =========================
     3.3 MOSTRAR PESTAÑA
     =========================
     Microservicio para ocultar todas las secciones
     y mostrar solo la seleccionada
  */
        showTab(index) {
          /* Ocultar todas las secciones */
          document
            .querySelectorAll(".tab-section")
            .forEach((sec) => (sec.style.display = "none"));

          /* Mostrar la sección correspondiente */
          const sectionId = this.sectionIds[index];
          document.getElementById(sectionId).style.display = "block";
        }

        /* =========================
     3.4 RENDERIZADO
     ========================= */
        render(container) {
          container.appendChild(this.container);
        }
      }

      /* ==================================================
   4. INICIALIZACIÓN DE LA APLICACIÓN
   ================================================== */

      /* Crear instancia del componente de pestañas */
      const myTabs = new Tabs(
        ["Inicio", "Productos", "Contacto"], // Nombres visibles
        ["inicio", "productos", "contacto"], // IDs de las secciones
      );

      /* Renderizar las pestañas dentro del contenedor */
      myTabs.render(document.getElementById("tabsContainer"));
    </script>
  </body>
</html>
