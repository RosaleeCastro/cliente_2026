<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Estilizar</title>
    <style>
      body {
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: #f9f9f9;
        padding: 40px;
      }

      table {
        width: 80%;
        margin: auto;
        border-collapse: collapse;
        background: white;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        border-radius: 8px;
        overflow: hidden;
      }

      th,
      td {
        padding: 12px 16px;
        text-align: left;
      }

      th {
        background: #4caf50;
        color: white;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      tr:nth-child(even) {
        background: #f2f2f2;
      }

      tr:hover {
        background: #eafaf1;
      }

      td {
        color: #333;
      }

      button {
        background-color: #4caf50;
        color: white;
        border: none;
        padding: 8px 12px;
        border-radius: 5px;
        cursor: pointer;
        transition: background 0.3s;
      }

      button:hover {
        background-color: #45a049;
      }
      .oculto {
        display: none;
      }
    </style>
  </head>
  <body>
    <table></table>
    <script>
      const clientes = [
        {
          id: 1,
          nombre: "Laura Gómez",
          email: "laura.gomez@example.com",
          telefono: "+34 612 345 678",
          fecha_alta: "2023-05-14",
          activo: true,
          codigo_postal: "46001",
          balance: 1250.75,
        },
        {
          id: 2,
          nombre: "Carlos Martínez",
          email: "carlos.martinez@example.com",
          telefono: "+34 698 765 432",
          fecha_alta: "2024-01-20",
          activo: false,
          codigo_postal: "28013",
          balance: 340.5,
        },
        {
          id: 3,
          nombre: "Ana Torres",
          email: "ana.torres@example.com",
          telefono: "+34 634 112 233",
          fecha_alta: "2022-11-03",
          activo: true,
          codigo_postal: "41001",
          balance: 980.0,
        },
        {
          id: 4,
          nombre: "David López",
          email: "david.lopez@example.com",
          telefono: "+34 622 987 654",
          fecha_alta: "2024-07-08",
          activo: true,
          codigo_postal: "08002",
          balance: 2150.2,
        },
        {
          id: 5,
          nombre: "María Fernández",
          email: "maria.fernandez@example.com",
          telefono: "+34 655 443 221",
          fecha_alta: "2023-03-25",
          activo: false,
          codigo_postal: "29008",
          balance: 0.0,
        },
      ];
      let tabla = document.querySelector("table");
      let claves = Object.keys(clientes[0]);

      //Función de obtener Población
      function obtenerPoblacion(codigoPostal) {
        if (codigoPostal === "46001") return "Valencia";
        if (codigoPostal === "28013") return "Madrid";
        if (codigoPostal === "41001") return "Sevilla";
        if (codigoPostal === "08002") return "Barcelona";
        if (codigoPostal === "29008") return "Malaga";
        return "Desconocida";
      }

      // Cabecera con columna "Acción"
      let cadena = "<tr>";
      claves.forEach((clave) => {
        cadena += "<th>" + clave + "</th>";
      });
      cadena += "<th>Acción</th>";
      cadena += "<th>CP</th>";
      cadena += "<th>Balance</th>";
      cadena += "<th>Población</th>";
      cadena += "</tr>";

      // Filas
      clientes.forEach((cliente) => {
        cadena += "<tr>";
        for (let clave in cliente) {
          cadena += "<td>" + cliente[clave] + "</td>";
        }
        cadena += `<td><button class="btnSaluda">Saluda</button></td>`;
        if (cliente.activo) {
          cadena += `<td><button class="btnCP">Mostrar CP</button></td>`;
          cadena += `<td><button class="btnBalance">Mostrar Balance</button></td>`;
          cadena += `<td>${obtenerPoblacion(cliente.codigo_postal)}</td>`;
        } else {
          cadena += "<td></td>";
          cadena += "<td></td>";
          cadena += "<td></td>";
          cadena += "<td></td>";
        }
        cadena += "</tr>";
      });

      tabla.innerHTML = cadena;

      // Asignar listeners a todos los botones
      document.querySelectorAll(".btnSaluda").forEach((boton) => {
        boton.addEventListener("click", (e) => {
          // Accede a la celda "nombre" (segunda columna del <tr>)
          const fila = e.target.closest("tr");
          const nombre = fila.children[1].textContent;
          alert("¡Hola, " + nombre + "!");
        });
      });

      document.querySelectorAll(".btnCP").forEach((boton) => {
        boton.addEventListener("click", (e) => {
          //Accedo a la celda "codigoPostal"
          const fila = e.target.closest("tr");
          const codigoPostal = fila.children[6].textContent;
          alert("Código postal: " + codigoPostal);
        });
      });

      document.querySelectorAll(".btnBalance").forEach((boton) => {
        boton.addEventListener("click", (e) => {
          const fila = e.target.closest("tr");
          const balance = fila.children[7].textContent;
          alert("Balance : " + balance);
        });
      });
    </script>
  </body>
</html>
