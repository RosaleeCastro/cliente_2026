<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Formulario didáctico</title>

    <style>
      /* Estilos simples para aprendizaje */

      body {
        font-family: Arial;
        padding: 40px;
      }

      form {
        width: 400px;
      }

      label {
        display: block;
        margin-top: 10px;
      }

      input,
      textarea {
        width: 100%;
        padding: 6px;
        margin-top: 4px;
      }

      button {
        margin-top: 15px;
        padding: 8px 15px;
      }

      .error {
        border: 2px solid red;
      }

      .correcto {
        border: 2px solid green;
      }
    </style>
  </head>

  <body>
    <h2>Formulario de contacto</h2>

    <form id="formulario">
      <label>
        Nombre
        <input type="text" name="nombre" />
      </label>

      <label>
        Email
        <input type="email" name="email" />
      </label>

      <label>
        Teléfono
        <input type="text" name="telefono" />
      </label>

      <label>
        Dirección
        <input type="text" name="direccion" />
      </label>

      <label>
        Ciudad
        <input type="text" name="ciudad" />
      </label>

      <label>
        Comentarios
        <textarea name="comentarios"></textarea>
      </label>

      <button type="submit">Enviar</button>
    </form>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        /* ================================
          1 REFERENCIA AL FORMULARIO
          ================================ */

        const formulario = document.getElementById("formulario");

        /* ======================================
         2 SELECCIONAR TODOS LOS CAMPOS
         ====================================== */

        /*
querySelectorAll permite seleccionar
varios elementos usando selectores CSS

En este caso buscamos:
- todos los input
- todos los textarea

dentro del formulario
*/

        const campos = formulario.querySelectorAll("input, textarea");

        console.log("Campos encontrados:", campos);

        /* ======================================
   3 RECORRER LOS CAMPOS CON FOREACH
   ====================================== */

        /*
forEach permite recorrer una lista
de elementos uno por uno
*/

        campos.forEach(function (campo) {
          console.log("Campo encontrado:", campo.name);
        });

        /* ======================================
   4 EVENTO DEL FORMULARIO
   ====================================== */

        formulario.addEventListener("submit", function (event) {
          /*
evitamos que el formulario
recargue la página
*/

          event.preventDefault();

          /* ================================
   5 VALIDAR CAMPOS VACÍOS
   ================================ */

          let valido = true;

          campos.forEach(function (campo) {
            if (campo.value.trim() === "") {
              campo.classList.add("error");
              valido = false;
            } else {
              campo.classList.remove("error");
              campo.classList.add("correcto");
            }
          });

          if (!valido) {
            alert("Por favor complete todos los campos");
            return;
          }

          /* ======================================
   6 OBTENER LOS DATOS CON FORMDATA
   ====================================== */

          /*
          FormData es una clase de JavaScript
          que permite capturar todos los datos
          de un formulario automáticamente
        */

          const datosFormulario = new FormData(formulario);

          /* ======================================
                7 MOSTRAR LOS DATOS OBTENIDOS
             ====================================== */

          /*
FormData guarda los datos como pares:

nombre → valor
*/

          for (let [campo, valor] of datosFormulario) {
            console.log(campo + ":", valor);
          }

          /* ======================================
   8 CONVERTIR LOS DATOS A OBJETO
   ====================================== */

          /*
Esto es muy útil para enviar
los datos a una API o base de datos
*/

          const objetoDatos = Object.fromEntries(datosFormulario.entries());

          console.log("Objeto final:", objetoDatos);

          /* ======================================
   9 EJEMPLO DE RESULTADO
   ====================================== */

          /*
El objeto queda así:

{
nombre: "Ana",
email: "ana@email.com",
telefono: "123456",
direccion: "Calle 1",
ciudad: "Madrid",
comentarios: "Hola"
}
*/

          alert("Formulario enviado correctamente");
        });
      });
    </script>
  </body>
</html>
