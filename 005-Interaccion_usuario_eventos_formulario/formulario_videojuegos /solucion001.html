<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulario de desarrollador</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 24px;
        background-color: #f7f7f7;
      }

      h1 {
        margin-bottom: 8px;
      }

      p {
        margin-top: 0;
      }

      form {
        max-width: 780px;
      }

      fieldset {
        margin-bottom: 18px;
        padding: 16px;
        border: 1px solid #cfcfcf;
        background-color: #ffffff;
      }

      legend {
        font-weight: bold;
      }

      .fila {
        margin-bottom: 12px;
      }

      label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }

      input,
      select,
      button {
        width: 100%;
        box-sizing: border-box;
        padding: 8px;
        font-size: 14px;
      }

      .checkbox-linea {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .checkbox-linea input {
        width: auto;
      }

      .oculto {
        display: none;
      }

      .error {
        border: 2px solid #c62828;
        background-color: #ffecec;
      }

      .msg-error {
        color: #b00020;
        margin: 6px 0 0;
        font-size: 13px;
      }

      #resumenEnvio {
        margin-top: 18px;
        padding: 14px;
        border: 1px solid #cfcfcf;
        background-color: #ffffff;
        white-space: pre-line;
      }

      .botones {
        display: flex;
        gap: 10px;
      }

      .botones button {
        flex: 1;
      }
    </style>
  </head>
  <body>
    <h1>Alta de desarrollador</h1>
    <p>
      Ejemplo sencillo basado en lo visto en clase: eventos, validación,
      mostrar/ocultar campos y limpieza básica de datos.
    </p>

    <form id="formDesarrollador" novalidate>
      <fieldset>
        <legend>Datos personales</legend>

        <div class="fila">
          <label for="nombre">Nombre</label>
          <input
            type="text"
            id="nombre"
            name="nombre"
            maxlength="80"
            placeholder="Máximo 80 caracteres"
          />
        </div>

        <div class="fila">
          <label for="apellido">Apellido</label>
          <input
            type="text"
            id="apellido"
            name="apellido"
            maxlength="120"
            placeholder="Máximo 120 caracteres"
          />
        </div>

        <div class="fila">
          <label for="email">Email</label>
          <input
            type="text"
            id="email"
            name="email"
            maxlength="150"
            placeholder="Máximo 150 caracteres"
          />
        </div>

        <div class="fila">
          <label for="ciudad">Ciudad</label>
          <input
            type="text"
            id="ciudad"
            name="ciudad"
            maxlength="80"
            placeholder="Máximo 80 caracteres"
          />
        </div>

        <div class="fila">
          <label for="pais">País</label>
          <input
            type="text"
            id="pais"
            name="pais"
            maxlength="80"
            placeholder="Máximo 80 caracteres"
          />
        </div>

        <div class="fila">
          <label for="fecha_nacimiento">Fecha de nacimiento</label>
          <input type="date" id="fecha_nacimiento" name="fecha_nacimiento" />
        </div>
      </fieldset>

      <fieldset>
        <legend>Datos laborales</legend>

        <div class="fila">
          <label class="checkbox-linea" for="activo">
            <input type="checkbox" id="activo" name="activo" />
            <span>Activo</span>
          </label>
        </div>

        <div class="fila">
          <label for="fecha_alta">Fecha de alta</label>
          <input type="date" id="fecha_alta" name="fecha_alta" />
        </div>

        <div class="fila oculto" id="filaEstudio">
          <label for="id_estudio">Estudio</label>
          <select id="id_estudio" name="id_estudio">
            <option value="">Sin estudio</option>
            <option value="1">Larian Studios</option>
            <option value="2">FromSoftware</option>
            <option value="3">CD PROJEKT RED</option>
            <option value="4">Supergiant Games</option>
            <option value="5">Mojang Studios</option>
            <option value="6">MercurySteam</option>
          </select>
        </div>
      </fieldset>

      <div class="botones">
        <button type="submit">Enviar</button>
        <button type="reset">Limpiar</button>
      </div>
    </form>

    <div id="resumenEnvio">Aquí aparecerá el resumen del envío.</div>

    <script>
      // =========================================================
      // 1. REFERENCIAS A LOS ELEMENTOS DEL FORMULARIO
      // =========================================================
      // Guardamos los elementos en constantes para reutilizarlos
      // fácilmente durante toda la validación.
      const form = document.getElementById("formDesarrollador");
      const resumenEnvio = document.getElementById("resumenEnvio");

      const nombre = document.getElementById("nombre");
      const apellido = document.getElementById("apellido");
      const email = document.getElementById("email");
      const ciudad = document.getElementById("ciudad");
      const pais = document.getElementById("pais");
      const fechaNacimiento = document.getElementById("fecha_nacimiento");
      const activo = document.getElementById("activo");
      const fechaAlta = document.getElementById("fecha_alta");
      const filaEstudio = document.getElementById("filaEstudio");
      const idEstudio = document.getElementById("id_estudio");

      // =========================================================
      // 2. FECHA DE HOY
      // =========================================================
      // La usamos para comprobar que las fechas no sean futuras.
      const hoy = new Date().toISOString().split("T")[0];

      // =========================================================
      // 3. FUNCIONES DE LIMPIEZA DE TEXTO
      // =========================================================
      // El enunciado pide limpiar caracteres no permitidos.
      // Aquí dejamos letras, números, espacios, tildes, puntos,
      // guiones y algunos símbolos básicos.
      function limpiarTextoGeneral(valor) {
        return valor.replace(/[^a-zA-Z0-9áéíóúÁÉÍÓÚüÜñÑ\s.,'-]/g, "");
      }

      // Para email permitimos letras, números y caracteres típicos
      // de un correo.
      function limpiarEmail(valor) {
        return valor.replace(/[^a-zA-Z0-9@._+-]/g, "");
      }

      // =========================================================
      // 4. FUNCIONES DE ERRORES
      // =========================================================
      // Son parecidas al ejemplo: añaden clase CSS roja y un mensaje
      // justo debajo del campo que falla.
      function limpiarErrores() {
        form.querySelectorAll(".error").forEach(function (elemento) {
          elemento.classList.remove("error");
        });

        form.querySelectorAll(".msg-error").forEach(function (mensaje) {
          mensaje.remove();
        });
      }

      function limpiarErrorDeCampo(campo) {
        campo.classList.remove("error");

        const siguiente = campo.nextElementSibling;
        if (siguiente && siguiente.classList.contains("msg-error")) {
          siguiente.remove();
        }
      }

      function ponerError(campo, mensaje) {
        limpiarErrorDeCampo(campo);

        campo.classList.add("error");

        const textoError = document.createElement("p");
        textoError.className = "msg-error";
        textoError.textContent = mensaje;

        campo.insertAdjacentElement("afterend", textoError);
      }

      // =========================================================
      // 5. MOSTRAR U OCULTAR EL SELECT DE ESTUDIO
      // =========================================================
      // Si el desarrollador está activo, enseñamos el select.
      // Si no está activo, lo ocultamos y lo dejamos vacío para
      // simular el NULL que iría a base de datos.
      function actualizarVisibilidadEstudio() {
        if (activo.checked) {
          filaEstudio.classList.remove("oculto");
        } else {
          filaEstudio.classList.add("oculto");
          idEstudio.value = "";
          limpiarErrorDeCampo(idEstudio);
        }
      }

      // =========================================================
      // 6. LIMPIEZA EN TIEMPO REAL
      // =========================================================
      // Cada vez que el usuario escribe, quitamos caracteres que no
      // interesan y además limpiamos el error del campo para que se vea
      // que se está corrigiendo.
      nombre.addEventListener("input", function () {
        nombre.value = limpiarTextoGeneral(nombre.value);
        limpiarErrorDeCampo(nombre);
      });

      apellido.addEventListener("input", function () {
        apellido.value = limpiarTextoGeneral(apellido.value);
        limpiarErrorDeCampo(apellido);
      });

      email.addEventListener("input", function () {
        email.value = limpiarEmail(email.value);
        limpiarErrorDeCampo(email);
      });

      ciudad.addEventListener("input", function () {
        ciudad.value = limpiarTextoGeneral(ciudad.value);
        limpiarErrorDeCampo(ciudad);
      });

      pais.addEventListener("input", function () {
        pais.value = limpiarTextoGeneral(pais.value);
        limpiarErrorDeCampo(pais);
      });

      fechaNacimiento.addEventListener("change", function () {
        limpiarErrorDeCampo(fechaNacimiento);
      });

      fechaAlta.addEventListener("change", function () {
        limpiarErrorDeCampo(fechaAlta);
      });

      idEstudio.addEventListener("change", function () {
        limpiarErrorDeCampo(idEstudio);
      });

      activo.addEventListener("change", function () {
        actualizarVisibilidadEstudio();
      });

      // =========================================================
      // 7. FUNCIONES PEQUEÑAS DE APOYO
      // =========================================================
      function textoVacio(valor) {
        return valor.trim() === "";
      }

      function fechaEsFutura(fechaTexto) {
        return fechaTexto > hoy;
      }

      function nombreEstudioSeleccionado() {
        if (idEstudio.value === "") {
          return "NULL";
        }

        return idEstudio.options[idEstudio.selectedIndex].text;
      }

      // =========================================================
      // 8. VALIDACION PRINCIPAL DEL FORMULARIO
      // =========================================================
      // Aquí revisamos todas las reglas del enunciado.
      form.addEventListener("submit", function (evento) {
        evento.preventDefault();
        limpiarErrores();

        let formularioValido = true;
        let primerError = null;

        // Guardamos todos los textos ya limpios y sin espacios de sobra.
        const valorNombre = nombre.value.trim();
        const valorApellido = apellido.value.trim();
        const valorEmail = email.value.trim();
        const valorCiudad = ciudad.value.trim();
        const valorPais = pais.value.trim();
        const valorFechaNacimiento = fechaNacimiento.value;
        const valorFechaAlta = fechaAlta.value;

        // NOMBRE: obligatorio y mínimo 2 caracteres.
        if (valorNombre.length < 2) {
          ponerError(
            nombre,
            "El nombre es obligatorio y debe tener mínimo 2 caracteres.",
          );
          if (!primerError) {
            primerError = nombre;
          }
          formularioValido = false;
        }

        // APELLIDO: obligatorio y mínimo 2 caracteres.
        if (valorApellido.length < 2) {
          ponerError(
            apellido,
            "El apellido es obligatorio y debe tener mínimo 2 caracteres.",
          );
          if (!primerError) {
            primerError = apellido;
          }
          formularioValido = false;
        }

        // EMAIL: opcional, pero si existe debe contener @.
        if (!textoVacio(valorEmail) && !valorEmail.includes("@")) {
          ponerError(email, "Si escribes un email, debe contener @.");
          if (!primerError) {
            primerError = email;
          }
          formularioValido = false;
        }

        // CIUDAD: opcional, pero si existe debe tener al menos 2 caracteres.
        if (!textoVacio(valorCiudad) && valorCiudad.length < 2) {
          ponerError(ciudad, "La ciudad debe tener al menos 2 caracteres.");
          if (!primerError) {
            primerError = ciudad;
          }
          formularioValido = false;
        }

        // PAIS: opcional, pero si existe debe tener al menos 2 caracteres.
        if (!textoVacio(valorPais) && valorPais.length < 2) {
          ponerError(pais, "El país debe tener al menos 2 caracteres.");
          if (!primerError) {
            primerError = pais;
          }
          formularioValido = false;
        }

        // FECHA NACIMIENTO: opcional, pero si existe no puede ser futura.
        if (
          valorFechaNacimiento !== "" &&
          fechaEsFutura(valorFechaNacimiento)
        ) {
          ponerError(
            fechaNacimiento,
            "La fecha de nacimiento no puede ser futura.",
          );
          if (!primerError) {
            primerError = fechaNacimiento;
          }
          formularioValido = false;
        }

        // REGLAS CUANDO ACTIVO ESTA MARCADO.
        if (activo.checked) {
          // FECHA ALTA obligatoria.
          if (valorFechaAlta === "") {
            ponerError(
              fechaAlta,
              "Si está activo, la fecha de alta es obligatoria.",
            );
            if (!primerError) {
              primerError = fechaAlta;
            }
            formularioValido = false;
          }

          // ID_ESTUDIO obligatorio si está activo.
          if (idEstudio.value === "") {
            ponerError(
              idEstudio,
              "Si está activo, debes seleccionar un estudio.",
            );
            if (!primerError) {
              primerError = idEstudio;
            }
            formularioValido = false;
          }
        } else {
          // Si NO está activo:
          // - el select debe ir oculto
          // - el valor se deja vacío para simular NULL
          // - fecha_alta no puede ser futura si está rellena
          if (valorFechaAlta !== "" && fechaEsFutura(valorFechaAlta)) {
            ponerError(
              fechaAlta,
              "Si no está activo, la fecha de alta no puede ser futura.",
            );
            if (!primerError) {
              primerError = fechaAlta;
            }
            formularioValido = false;
          }
        }

        // Si hay errores, mandamos el foco al primero.
        if (!formularioValido) {
          primerError.focus();
          resumenEnvio.textContent =
            "El formulario tiene errores. Corrige los campos marcados en rojo.";
          return;
        }

        // Si todo va bien, mostramos un resumen de lo que se enviaría.
        // Esto nos sirve para simular el envío a la base de datos.
        resumenEnvio.textContent =
          "Formulario correcto.\n\n" +
          "Datos que se enviarían:\n" +
          "nombre: " +
          valorNombre +
          "\napellido: " +
          valorApellido +
          "\nemail: " +
          (valorEmail === "" ? "NULL" : valorEmail) +
          "\nciudad: " +
          (valorCiudad === "" ? "NULL" : valorCiudad) +
          "\npais: " +
          (valorPais === "" ? "NULL" : valorPais) +
          "\nfecha_nacimiento: " +
          (valorFechaNacimiento === "" ? "NULL" : valorFechaNacimiento) +
          "\nfecha_alta: " +
          (valorFechaAlta === "" ? "NULL" : valorFechaAlta) +
          "\nactivo: " +
          (activo.checked ? "1" : "0") +
          "\nid_estudio: " +
          (idEstudio.value === "" ? "NULL" : idEstudio.value) +
          "\nestudio seleccionado: " +
          nombreEstudioSeleccionado();
      });

      // =========================================================
      // 9. RESET DEL FORMULARIO
      // =========================================================
      // Tras limpiar el formulario, también quitamos errores,
      // restablecemos la visibilidad del select y llevamos el foco
      // al primer campo.
      form.addEventListener("reset", function () {
        setTimeout(function () {
          limpiarErrores();
          resumenEnvio.textContent = "Aquí aparecerá el resumen del envío.";
          actualizarVisibilidadEstudio();
          nombre.focus();
        }, 0);
      });

      // =========================================================
      // 10. INICIO DE LA PAGINA
      // =========================================================
      // Nada más cargar la página:
      // - ponemos el select oculto si procede
      // - ponemos foco en el primer campo
      window.addEventListener("load", function () {
        actualizarVisibilidadEstudio();
        nombre.focus();
      });
    </script>
  </body>
</html>
